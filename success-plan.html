      hostRegex=/^([a-zA-Z0-9-]+)\.app\.everafter\.ai$/,
      hostsThatMatter=["app.eu.everafter.ai","app.everafter.ai"],
      currentHost=window.location.host,
      savedHost=document.cookie.split("; ").find(e=>e.startsWith("eaHost="))?.split("=")[1],
      lowercasedPathName=window.location.pathname.toLowerCase(),
      isIgnoreUrl=!!ignoreUrls.find(e=>-1!==lowercasedPathName.indexOf(e)),
      isPathMatchedToOneOfIgnoredRegex=ignoreRegexes.some(e=>new RegExp(e).test(lowercasedPathName)),
      isCurrentHostValid=hostRegex.test(currentHost)||hostsThatMatter.includes(currentHost),
      isSavedHostValid=hostRegex.test(savedHost)||hostsThatMatter.includes(savedHost),
      isHostMismatch=savedHost&&currentHost!==savedHost,
      shouldIgnore=!savedHost||isIgnoreUrl||isPathMatchedToOneOfIgnoredRegex||!isCurrentHostValid||!isSavedHostValid;
    if(!shouldIgnore&&isHostMismatch){const e=new URL(window.location);e.host=savedHost,window.location.replace(e.toString())}
  </script>

n Management",priority:"High",notes:"Drive broader POM usage and align future invoicing roadmap.",goals:[{title:"GOAL #1: Use POM for direct and indirect procurement",status:"In Progress",kpi:"Top 50% of spend activated through SCM (excluding EDI).",comments:"PO distribution migration to JAGGAER is active with NA plan in motion."},{title:"GOAL #2: Define invoicing approach",status:"In Progress",kpi:"KPI TBD.",comments:"Business case underway for JAGGAER invoicing model; SAP connection support needed for setup."}]},{area:"eProcurement",priority:"Low",notes:"Continue adoption and reduce support burden through guided experiences.",goals:[{title:"GOAL #1: Adopt & Assist to reduce support tickets",status:"Complete",kpi:"Reduce repeat tickets by 20-30%.",comments:"Reported 18-20% ticket reduction after Adopt; Assist usage reduced as JAI becomes preferred."},{title:"GOAL #2: Standardize ePro communications",status:"In Progress",kpi:"Increase percentage of customized system emails.",comments:"Still a priority; placeholder consistency is a current issue."},{title:"GOAL #3: Implement Guide Me questionnaire",status:"Not Started",kpi:"KPI TBD.",comments:"Considering form requests migration to improve dynamic intake."}]},{area:"Contracts+",priority:"Low",notes:"Build on existing maturity and target incremental value opportunities.",goals:[{title:"GOAL #1: Identify missed opportunities from implementation",status:"Complete",kpi:"Reduce cycle times by 30% with updated process.",comments:"Most functionality is leveraged. Opportunities include renewal/amendment requests and potential AI use cases."},{title:"GOAL #2: Implement Adopt guides for Contracts+ users",status:"In Progress",kpi:"KPI TBD.",comments:"Adoption support continues."},{title:"GOAL #3: Build out clause library",status:"In Progress",kpi:"KPI TBD.",comments:"Exploration in progress with support available as needed."}]}];

ourcing customers, are requisitions initiated from awarded sourcing events?",recommendation:"Initiate Requisition from Awarded Sourcing Events"},{id:"q11",goal:"Increase ROI",question:"Are you increasing shopping activity in ePro workflows to improve ROI?",recommendation:"Increase shopping activity originating within ePro to improve soft savings."}];
    const responseOptions=["Not Started","Considering","In Progress","Implemented","Not Applicable"],customerSelections={};
    const root=document.getElementById("root");
    root.innerHTML=`<main class="container"><section class="hero"><h1>Kohler CSM Success Plan 2026</h1><p>Interactive customer view with plan, goals questionnaire, progress tracking, and resources.</p><div class="tabs"><button class="tab-btn active" data-tab="plan">Success Plan</button><button class="tab-btn" data-tab="goals">Goals</button><button class="tab-btn" data-tab="progress">Progress</button><button class="tab-btn" data-tab="resources">Resources</button></div></section><section class="panel active" id="panel-plan"><div class="controls"><input id="search" type="search" placeholder="Search goals, KPIs, comments..." /><select id="priorityFilter"><option value="">All Priorities</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select><select id="statusFilter"><option value="">All Statuses</option><option value="In Progress">In Progress</option><option value="Complete">Complete</option><option value="Not Started">Not Started</option></select></div><section class="timeline"><h2>2026 Release Timeline</h2><p class="sub">Review planning and production milestones for customer communication.</p><div class="timeline-grid" id="timeline"></div></section><section class="stats" id="stats"></section><section class="areas" id="areas"></section></section><section class="panel" id="panel-goals"><section class="goals-panel"><div class="goals-toolbar"><select id="goalFilter"></select><div>Customer selection: choose a status for each question.</div></div><div class="question-list" id="questionList"></div></section></section><section class="panel" id="panel-progress"><section class="progress-panel"><h2>Progress Tracking</h2><p class="sub">Tracks completion from the Goals tab selections.</p><div id="progressSummary"></div><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div><table class="progress-table"><thead><tr><th>Goal</th><th>Question</th><th>Status</th></tr></thead><tbody id="progressRows"></tbody></table></section></section><section class="panel" id="panel-resources"><section class="resources-panel"><h2>Resources</h2><p class="sub">Helpful release references for customer follow-up.</p><p><a href="https://www.jaggaer.com/releases/25-3-release-highlights" target="_blank" rel="noopener noreferrer">JAGGAER 25.3 Release Highlights</a></p><p><a href="https://library.jaggaer.com/release/product-release-26" target="_blank" rel="noopener noreferrer">JAGGAER Product Release 26</a></p></section></section></main>`;

    function setupTabs(){const b=[...document.querySelectorAll(".tab-btn")],p={plan:document.getElementById("panel-plan"),goals:document.getElementById("panel-goals"),progress:document.getElementById("panel-progress"),resources:document.getElementById("panel-resources")};b.forEach(btn=>btn.addEventListener("click",()=>{const s=btn.dataset.tab;b.forEach(x=>x.classList.toggle("active",x===btn));Object.entries(p).forEach(([k,v])=>v.classList.toggle("active",k===s));if(s==="progress")renderProgress()}))}
