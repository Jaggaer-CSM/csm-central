<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSM AI Roadmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    .roadmap-frame { width: 100%; height: 100vh; border: none; display: block; }
    .hub-button {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 20px; background: #246bfe; color: #fff;
      font-family: "Aptos","Segoe UI",Arial,sans-serif;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 999px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(36,107,254,0.45);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .hub-button:hover { box-shadow: 0 6px 28px rgba(36,107,254,0.55); transform: translateY(-2px); }
    .hub-button svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>
  <iframe class="roadmap-frame" src="ai-roadmap.html" title="CSM AI Roadmap"></iframe>
  <a href="csm-central.html" class="hub-button">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    CSM Hub
  </a>
</body>
</html>
